# =========================================
# Experiment Configuration
# =========================================

experiment:
  name: melanoma_sgan_high_capacity_128
  seed: 42


# =========================================
# Dataset Configuration
# =========================================

dataset:

  labeled_path: data/labeled
  unlabeled_path: data/unlabeled/images
  generated_path: data/generated

  image_size: 64
  num_channels: 3
  num_classes: 2


# =========================================
# Generator Configuration
# =========================================

generator:

  latent_dim: 256
  feature_maps: 160


# =========================================
# Discriminator Configuration
# =========================================

discriminator:

  feature_maps: 128          # v3.1: 64 was too weak (D collapsed to margin 0.01,
                             # couldn't separate real/fake). 128 is the middle
                             # ground between v2's 160 (memorized) and 64 (collapsed);
                             # R1 penalty now stabilizes it instead of capacity alone.


# =========================================
# Training Configuration
# =========================================

training:

  batch_size: 256
  epochs: 600

  lr_generator: 0.0001        # v3.1 TTUR: G slower than D
  lr_discriminator: 0.0003    # v3.1 TTUR: D faster (3×G) so it stays informative;
                              # safe now that R1 keeps D from over-sharpening

  beta1: 0.0                  # v3.1: beta1=0 is standard for R1-regularized GANs
  beta2: 0.99

  num_workers: 8

  r1_gamma: 10.0              # R1 gradient-penalty weight (0 disables). 10 is the
                              # StyleGAN2 default; lower if D under-fits, raise if it
                              # over-sharpens.
  r1_interval: 16            # apply R1 every 16 D steps (lazy regularization)


# =========================================
# Logging / Saving
# =========================================

output:

  checkpoint_dir: outputs/checkpoints
  sample_dir: outputs/samples
  log_dir: outputs/logs

  save_interval: 5
  sample_interval: 1


# =========================================
# Generator Loss Configuration (v3)
# =========================================
# loss_G = adversarial_weight * non-saturating adversarial loss
#        + dino_mmd_weight    * per-sample RBF-MMD(DINO real, DINO fake)
#
# Sequenced plan:
#   Run 1 (this config): adversarial_weight=1.0, dino_mmd_weight=0.0
#       → pure adversarial SGAN baseline. Goal: confirm FID drops from ~400
#         to a sane range (realistic images) with the rebalanced discriminator.
#   Run 2 (contribution): set dino_mmd_weight=0.3 (or sweep) to add the
#       per-sample DINO distribution-matching term on top of the working baseline.

generator_loss:

  adversarial_weight: 1.0
  dino_mmd_weight: 0.0


# =========================================
# DINO Feature Matching Configuration
# =========================================
# Remove this section entirely to fall back to discriminator feature matching.

dino:

  model: dinov2_vitb14       # DINOv2 ViT-B/14 — publicly available weights.
                             # (DINOv3 weights not publicly released as of June 2026.)
  input_size: 112            # Must be multiple of patch_size.
                             # DINOv2 patch_size=14: 112=8×14 → 64 patch tokens ✓
                             # 224 → 256 tokens (OOM at batch=256 on 8GB GPU)

  projection_head_path: outputs/projection_head.pt   # set by pretrain_projhead.py

  lambda_cc: 0.1             # weight for class-conditional matching term
  lambda_var: 0.0            # weight for variance matching term (0 = disabled)

  pretrain_epochs: 200       # SupCon pre-training epochs for projection head
  pretrain_lr: 0.001
  supcon_temperature: 0.5    # τ=0.5: soft clusters, avoids within-class collapse at N=100

  lambda_cc_warmup_start: 50    # epoch at which class-conditional term activates
  lambda_cc_warmup_epochs: 50   # linear ramp duration (0 → lambda_cc over N epochs)