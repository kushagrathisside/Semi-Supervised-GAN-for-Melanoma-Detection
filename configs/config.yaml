# =========================================
# Experiment Configuration
# =========================================

experiment:
  name: melanoma_sgan_high_capacity_128
  seed: 42


# =========================================
# Dataset Configuration
# =========================================

dataset:

  labeled_path: data/labeled
  unlabeled_path: data/unlabeled/images
  generated_path: data/generated

  image_size: 64
  num_channels: 3
  num_classes: 2


# =========================================
# Generator Configuration
# =========================================

generator:

  latent_dim: 256
  feature_maps: 160


# =========================================
# Discriminator Configuration
# =========================================

discriminator:

  feature_maps: 160


# =========================================
# Training Configuration
# =========================================

training:

  batch_size: 256
  epochs: 600

  lr_generator: 0.0002
  lr_discriminator: 0.0001

  beta1: 0.5
  beta2: 0.999

  num_workers: 8


# =========================================
# Logging / Saving
# =========================================

output:

  checkpoint_dir: outputs/checkpoints
  sample_dir: outputs/samples
  log_dir: outputs/logs

  save_interval: 5
  sample_interval: 1


# =========================================
# DINO Feature Matching Configuration
# =========================================
# Remove this section entirely to fall back to discriminator feature matching.

dino:

  model: dinov3_vitb16       # DINOv3 distilled ViT-B/16 (trained on 1.7B images,
                             # 12× more data than DINOv2; Gram anchoring for stable
                             # dense features). Falls back to dinov2_vitb14 if needed.
  input_size: 112            # Must be multiple of patch_size.
                             # DINOv3 patch_size=16: 112=7×16 → 49 patch tokens ✓
                             # DINOv2 patch_size=14: 112=8×14 → 64 patch tokens ✓
                             # 224 → 196/256 tokens (OOM at batch=256 on 8GB GPU)

  projection_head_path: outputs/projection_head.pt   # set by pretrain_projhead.py

  lambda_cc: 0.1             # weight for class-conditional matching term
  lambda_var: 0.0            # weight for variance matching term (0 = disabled)

  pretrain_epochs: 100       # SupCon pre-training epochs for projection head
  pretrain_lr: 0.001
  supcon_temperature: 0.15   # τ; higher = softer clusters, lower collapse risk

  lambda_cc_warmup_start: 50    # epoch at which class-conditional term activates
  lambda_cc_warmup_epochs: 50   # linear ramp duration (0 → lambda_cc over N epochs)