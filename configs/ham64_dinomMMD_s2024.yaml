experiment:
  name: ham64_dinomMMD_s2024
  seed: 2024
dataset:
  labeled_path: data/ham64/labeled
  unlabeled_path: data/ham64/unlabeled/images
  generated_path: data/generated
  image_size: 64
  num_channels: 3
  num_classes: 2
generator:
  latent_dim: 256
  feature_maps: 160
discriminator:
  feature_maps: 128
training:
  batch_size: 256
  epochs: 600
  lr_generator: 0.0001
  lr_discriminator: 0.0003
  beta1: 0.0
  beta2: 0.99
  num_workers: 16
  r1_gamma: 10.0
  r1_interval: 16
output:
  checkpoint_dir: outputs/ham64_dinomMMD_s2024/checkpoints
  sample_dir: outputs/ham64_dinomMMD_s2024/samples
  log_dir: outputs/ham64_dinomMMD_s2024/logs
  save_interval: 5
  sample_interval: 1
generator_loss:
  adversarial_weight: 1.0
  dino_mmd_weight: 0.3
dino:
  model: dinov2_vitb14
  input_size: 112
  projection_head_path: outputs/ham64/projection_head.pt
  lambda_cc: 0.1
  lambda_var: 0.0
  pretrain_epochs: 200
  pretrain_lr: 0.001
  supcon_temperature: 0.5
  lambda_cc_warmup_start: 50
  lambda_cc_warmup_epochs: 50
